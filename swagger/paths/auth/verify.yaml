#/swagger/paths/user/verify.yaml

tags:
  - User
summary: Verify email
operationId: verifyUserEmail
description: 'Verify user`s email by token from email'
security:
  - bearerAuth: []
parameters:
  - name: token
    in: query
    required: true
    description: 'Verification token'
    schema:
      type: string
      example: 'eyJhbGciOiJIUzI1NiIs...'
responses:
  '200':
    description: 'Email verified successfully'
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Email verified'
  '401':
    $ref: '../../components/responses/401.yaml'
