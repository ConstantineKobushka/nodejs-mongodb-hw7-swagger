#/swagger/paths/user/getOAuthUrlL.yaml

tags:
  - User
summary: Get Google OAuth URL
operationId: getGoogleOAuthUrl
description: Returns Google OAuth authorization URL
security:
  - bearerAuth: []
responses:
  '200':
    description: Successfully get Google OAuth url
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully get Google OAuth url
            data:
              type: object
              properties:
                url:
                  type: string
                  example: https://accounts.google.com/o/oauth2/auth?client_id=...
