#/swagger/paths/user/login.yaml

tags:
  - User
summary: Login user
operationId: loginUser
description: 'Login a user with payload'
security:
  - bearerAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            description: "User's email"
            type: string
            example: 'john.doe@example.com'
          password:
            description: "User's password"
            type: string
            example: '123456'
responses:
  '200':
    description: 'Login a user with payload'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Successfully logged in an user!'
            data:
              type: object
              properties:
                accessToken:
                  description: 'Uccess token'
                  type: string
                  example: 'XJq8m9Yi13ErMUT2eCcvQnH2yXp7ZpPhKwvDTWQW'
                user:
                  description: 'User data'
                  type: object
                  properties:
                    _id:
                      description: 'User id'
                      type: string
                      example: '6a2d291b4a5a453a06b63afb'
                    name:
                      description: 'User name'
                      type: string
                      example: 'John Doe'
                    email:
                      description: 'User email'
                      type: string
                      example: 'john.doe@example.com'
  '401':
    $ref: '../../components/responses/401.yaml'
