#/swagger/paths/user/requestResetEmail.yaml

tags:
  - User
summary: Request reset email
operationId: requestResetEmail
description: 'Request reset email'
security:
  - bearerAuth: []
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - email
        properties:
          email:
            description: "User's email"
            type: string
            example: 'john.doe@example.com'
responses:
  '200':
    description: 'Request reset email'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Reset password email was successfully sent!'
            data:
              type: object
  '401':
    $ref: '../../components/responses/401.yaml'
