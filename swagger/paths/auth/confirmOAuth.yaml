#/swagger/paths/user/confirmOAuth.yaml

tags:
  - User
summary: Login with Google OAuth
operationId: loginWithGoogle
description: Login or register user using Google OAuth
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - code
        properties:
          code:
            type: string
            description: Google OAuth code
            example: 4/0AX4XfWh...
responses:
  '200':
    description: Successfully login with Google OAuth
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully login with Google OAuth
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: XJq8m9Yi13ErMUT2eCcvQnH2yXp7ZpPhKwvDTWQW
  '401':
    $ref: '../../components/responses/401.yaml'
